# @package _global_
# =============================================================================
# XqRobotV2 双轮腿机器人 PPO 粗糙地形训练配置 (MuJoCo 后端)
# 地形类型: random_rough 40%, wave 40%, slope 10%, slope_inv 10%
# =============================================================================
training:
  task_name: XqRobotV2WalkRough
  sim_backend: mujoco
  play_steps: 500
  play_env_num: 16
  render_spacing: 0.0
  cam_tracking: true
  cam_tracking_env_idx: 0

interactive:
  action_mode: policy
  policy_obs_mode: auto
  camera_follow_body: true
  use_env_visual_model: false

algo:
  num_envs: 2048
  num_steps_per_env: 24
  max_iterations: 3000
  empirical_normalization: false
  obs_groups:
    actor:
      - actor
    critic:
      - critic
  policy:
    activation: elu
    actor_hidden_dims: [512, 512, 256, 128]
    critic_hidden_dims: [512, 512, 256, 128]
    init_noise_std: 1.0
  algorithm:
    learning_rate: 1.0e-4
    entropy_coef: 0.01
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    desired_kl: 0.01
    max_grad_norm: 1.0

env:
  control_config:
    action_scale: 0.25
    wheel_action_scale: 5.0
    clip_actions: 100.0
  commands:
    vel_limit:
      - [-1.0, -0.5, -1.5, -0.1, 0.40]
      - [1.0, 0.5, 1.5, 0.1, 0.90]
    resampling_time: 10.0
  terrain_scan:
    enabled: true
    hfield_name: terrain_hfield
    geom_name: floor
  terrain_curriculum:
    enabled: false
  termination_config:
    terrain_out_of_bounds: true
    terrain_distance_buffer: 3.0
  domain_rand:
    randomize_base_mass: false
    randomize_ground_friction: false
    randomize_kp: false
    randomize_kd: false
    random_com: false
    randomize_leg_length: true
    leg_length_scale_range: [0.8, 1.2]
  curriculum:
    enabled: true
    vel_step: 0.002
    ang_vel_step: 0.004
    min_vel_range_frac: 0.3
    min_ang_range_frac: 0.05
    update_interval: 25
    err_threshold: 0.35

reward:
  only_positive_rewards: false
  scales:
    tracking_lin_vel: 1.5
    tracking_ang_vel: 1.5
    lin_vel_z: -0.2
    ang_vel_xy: -0.05
    base_height: -5.0
    orientation: -5.0
    joint_action_rate: -0.1
    wheel_action_rate: -0.015
    leg_mirror: -0.3
    tsk: -2.0
    alive: 1.0
  tracking_sigma: 0.3
  base_height_target: 0.65
  max_tilt_deg: 60.0
  min_base_height: 0.20
