# @package _global_
training:
  task_name: XqRobotV2WalkFlat
  sim_backend: motrix
algo:
  num_envs: 4096
  num_steps_per_env: 25
  max_iterations: 10000
  empirical_normalization: true
  obs_groups:
    default:
      - actor
  policy:
    activation: elu
    actor_hidden_dims: [512, 512, 256, 128]
    critic_hidden_dims: [512, 512, 256, 128]
    init_noise_std: 1.5
  algorithm:
    learning_rate: 1.0e-4
    entropy_coef: 0.01
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    desired_kl: 0.01
    max_grad_norm: 1.0
env:
  control_config:
    action_scale: 0.5
    wheel_action_scale: 10.0
    clip_actions: 100.0
  commands:
    vel_limit:
      - [0.0, 0.0, 0.0, -0.3]
      - [2.0, 0.0, 12.0, 0.3]
    resampling_time: 3.0
reward:
  only_positive_rewards: true
  scales:
    tracking_lin_vel: 1.5
    tracking_ang_vel: 1.5
    lin_vel_z: -0.2
    ang_vel_xy: -0.02
    base_height: -2.0
    orientation: -14.0
    joint_action_rate: -0.1
    wheel_action_rate: -0.015
    similar_calf: -0.3
    tsk: -2.0
    alive: 1.0
  tracking_sigma: 0.3
  base_height_target: 0.60
  max_tilt_deg: 60.0
  min_base_height: 0.20
