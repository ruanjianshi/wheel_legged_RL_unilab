# @package _global_
training:
  task_name: SmallHumanoidWalkFlat
  sim_backend: motrix
algo:
  num_envs: 512
  max_iterations: 1000
  empirical_normalization: true
  obs_groups:
    actor:
      - policy
    critic:
      - critic
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 0.005
env:
  domain_rand:
    randomize_kp: false
    randomize_kd: false
  control_config:
    action_scale: 0.25
  commands:
    vel_limit:
      - [0.0, 0.0, 0.0]
      - [0.2, 0.0, 0.1]
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 1.5
    scale_gyro: 0.2
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.05
    lin_vel_z: -0.2
    ang_vel_xy: -0.05
    base_height: -2.0
    orientation: -6.0
    action_rate: -0.005
    weighted_pose: -0.01
    alive: 0.0
  tracking_sigma: 0.25
  base_height_target: 0.52
  max_tilt_deg: 20.0
  min_base_height: 0.22
  # pose weights: 20 values, high on legs (0.01), very high on arms (50.0) to keep them still
  pose_weights: [0.01, 1.0, 0.01, 0.01, 0.01, 0.01, 1.0, 0.01, 0.01, 0.01, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
