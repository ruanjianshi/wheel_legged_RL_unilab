# @package _global_
training:
  task_name: SmallHumanoidWalkFlat
  sim_backend: mujoco
algo:
  num_envs: 512
  max_iterations: 1000
  empirical_normalization: false
  obs_groups:
    actor:
      - actor
    critic:
      - critic
  policy:
    init_noise_std: 0.8
  algorithm:
    learning_rate: 1.0e-3
    entropy_coef: 0.05
env:
  control_config:
    action_scale: 0.25
  commands:
    vel_limit:
      - [0.0, 0.0, 0.0]
      - [0.2, 0.0, 0.1]
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.05
    lin_vel_z: -0.2
    ang_vel_xy: -0.05
    base_height: -2.0
    orientation: -6.0
    action_rate: -0.005
    weighted_pose: -0.01
    alive: 0.0
  tracking_sigma: 0.25
  base_height_target: 0.52
  max_tilt_deg: 20.0
  min_base_height: 0.22
  pose_weights: [0.01, 1.0, 0.01, 0.01, 0.01, 0.01, 1.0, 0.01, 0.01, 0.01, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
