# HTDW-4438 HIMloco 策略参数 (对应训练 HTDW4438Cfg)
# 训练使用 HIMActorCritic，导出为 RKNN/ONNX 进行部署

policy_name: "walk/policy_htdw_4438_himloco.rknn"

algorithm: "himloco"

motor_group: "lowerBody"

dofs: 12

frame_stack: 6

# 单步观测: 指令(3) + 角速度(3) + 重力向量(3) + 关节位置(12) + 关节速度(12) + 上帧动作(12) = 45
num_single_obs: 45

# 控制频率 50Hz
frequency: 50.0

# 缩放参数 (与训练 obs_scales 一致)
cmd_lin_vel_scale: 2.0
cmd_ang_vel_scale: 0.25
rbt_lin_pos_scale: 1.0
rbt_lin_vel_scale: 0.05
rbt_ang_vel_scale: 0.25

# 指令范围 (与训练 commands.ranges 一致)
cmd_vel_x_min:   -1.00
cmd_vel_x_max:    1.00
cmd_vel_y_min:   -0.70
cmd_vel_y_max:    0.70
cmd_vel_yaw_min: -2.00
cmd_vel_yaw_max:  2.00

clip_obs: 100.0

pd_ctrl_f: 1000
rl_ctrl_f: 50

# 动作缩放 (与训练 action_scale 一致)
action_scale: 0.25

# 4438 关节名称
joint_names: [
 "FL_hip_joint", "FL_thigh_joint", "FL_calf_joint",
 "FR_hip_joint", "FR_thigh_joint", "FR_calf_joint",
 "RL_hip_joint", "RL_thigh_joint", "RL_calf_joint",
 "RR_hip_joint", "RR_thigh_joint", "RR_calf_joint"]

# 关节限位 (来自 URDF，转换为弧度)
clip_actions_lower: [-1.05, -1.57, -2.71,
                     -1.05, -1.57, -2.71,
                     -1.05, -1.57, -2.71,
                     -1.05, -1.57, -2.71]
clip_actions_upper: [ 1.05,  3.49, -0.84,
                      1.05,  3.49, -0.84,
                      1.05,  3.49, -0.84,
                      1.05,  3.49, -0.84]

clip_output_lower:  [-0.50, -0.50, -0.50,
                     -0.50, -0.50, -0.50,
                     -0.50, -0.50, -0.50,
                     -0.50, -0.50, -0.50]
clip_output_upper:  [ 0.50,  0.50,  0.50,
                      0.50,  0.50,  0.50,
                      0.50,  0.50,  0.50,
                      0.50,  0.50,  0.50]

# 仿真级 PD 参数 (与训练 control 一致)
kp: [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10]
kd: [0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3]

# 站立姿态默认角度 (与训练 default_joint_angles 一致)
default_angles: [0.0, 0.9, -1.5, 0.0, 0.9, -1.5, 0.0, 0.9, -1.5, 0.0, 0.9, -1.5]

# URDF 零位偏移 (与 default_angles 一致)
urdf_offset: [0.0, 0.9, -1.5, 0.0, 0.9, -1.5, 0.0, 0.9, -1.5, 0.0, 0.9, -1.5]
