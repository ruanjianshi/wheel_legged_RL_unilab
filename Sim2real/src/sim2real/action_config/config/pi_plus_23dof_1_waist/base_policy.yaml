# 按键说明
# abxy对应abxy
# r l 遥感按下
# rb lb 肩键
# dpl 十字键左 
# dpr 十字键右
# dpu 十字键上
# dpd 十字键下
# back back键
# start start键
# center 开机键
policy_change_config:
  - name: "set_ball_kick"
    policy: "set_ball_kick" # 对应rl.yaml的name字段
    path: "motion/byd_set_ball_kick.yaml"
    remark: "定位球"
    back_to_walk: true
    back_to_zero: true
    loop: false

  - name: "small_kick"
    policy: "small_kick"
    path: "motion/byd_small_kick.yaml"
    remark: "小脚踢球"
    back_to_walk: true
    back_to_zero: true
    loop: false
    pre_policy_change_condition: "velocity more than 0.0" # 触发下面的动作前的条件: 速度大于0
    pre_policy_change_description: "left leg front" # 条件描述: 需要左腿在前
    threasholds: [-0.63, -99.0, -99.0, -0.69, -0.04, -99.0,
                   0.15, -99.0, -99.0,  1.29,  0.64, -99.0]

  - name: "big_kick"
    policy: "big_kick"
    path: "motion/byd_big_kick.yaml"
    remark: "大脚踢球"
    back_to_walk: true
    back_to_zero: true
    loop: false
    pre_policy_change_condition: "velocity more than 0.0" # 触发下面的动作前的条件: 速度大于0
    pre_policy_change_description: "left leg front" # 条件描述: 需要左腿在前
    threasholds: [-0.63, -99.0, -99.0, -0.69, -0.04, -99.0,
                   0.15, -99.0, -99.0,  1.29,  0.64, -99.0]

  - name: "tackle"
    policy: "tackle"
    path: "motion/byd_tackle.yaml"
    remark: "抢断"
    back_to_walk: true
    back_to_zero: true
    loop: false

  - name: "confrontation"
